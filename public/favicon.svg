<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Gradient definitions for modern neon look -->
  <defs>
    <linearGradient id="prompt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F355DA" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
  </defs>

  <!-- Dark slate rounded background -->
  <rect width="32" height="32" rx="8" fill="#0D0E12" />
  
  <!-- Subtle inner border for premium feel -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" />

  <!-- Terminal symbol > with cyan gradient -->
  <path d="M9 9 L17 16 L9 23" 
        stroke="url(#prompt-grad)" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />

  <!-- Blinking/cursor underline _ with pink-purple gradient -->
  <line x1="19" y1="23" x2="27" y2="23" 
        stroke="url(#cursor-grad)" 
        stroke-width="3.5" 
        stroke-linecap="round" />
</svg>